<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Treuhänder Kartenfilter</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1217; --graphite:#5B6373; --steel:#939AA6;
  --line:#D8DAD4; --paper:#F6F6F3; --white:#FFFFFF;
  --signal:#0FA86F; --signal-deep:#0A7A52; --signal-tint:#E3F5EC;
  --verified:#2A4DF0; --reject:#C0392B;
  --font-sans:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--ink);-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:row;overflow:hidden}

/* Menü links — Papier */
#sidebar{width:232px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:9px;padding:16px 16px 14px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:9px}
.tile{width:30px;height:30px;background:var(--signal);border-radius:7px;display:flex;align-items:flex-end;padding:3px 4px;flex-shrink:0}
.tile span{font-weight:700;font-size:18px;color:#fff;line-height:.72;letter-spacing:-0.05em}
.tile span i{color:var(--ink);font-style:normal}
.wm{font-weight:700;letter-spacing:-0.035em;font-size:16px}
.wm i{color:var(--signal);font-style:normal}
#sidebar .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--steel)}
.home{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--graphite);text-decoration:none;border:1px solid var(--line);padding:6px 9px;border-radius:7px;white-space:nowrap;transition:color .15s,border-color .15s;align-self:flex-start}
.home:hover{color:var(--signal);border-color:var(--signal)}
.sep{height:1px;background:var(--line);margin:3px 0}
button{font-family:var(--font-sans);width:100%;padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:filter .15s,background .15s;text-align:center}
button:hover:not(:disabled){filter:brightness(1.05)}
button:disabled{opacity:.4;cursor:not-allowed}
#btnLoad{background:var(--signal);color:#fff}
#btnDraw{background:var(--white);color:var(--ink);border:1px solid var(--line)}
#btnDraw.active{background:var(--reject);color:#fff;border-color:var(--reject);animation:pulse 1s infinite}
#btnClear{background:transparent;color:var(--graphite);border:1px solid var(--line)}
#btnExport{background:var(--verified);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
#status{margin-top:auto;font-family:var(--font-mono);font-size:11px;letter-spacing:0.03em;color:var(--graphite);background:var(--white);border:1px solid var(--line);padding:9px 11px;border-radius:7px;line-height:1.5}
#status b{color:var(--signal-deep);font-weight:600}
#map{flex:1;height:100vh;min-width:0}
#fileInput{display:none}
#hint{position:fixed;bottom:18px;left:calc(50% + 116px);transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:9px;font-size:13px;z-index:999;display:none;pointer-events:none;box-shadow:0 6px 24px rgba(14,18,23,.28)}
.legend{background:#fff;padding:10px 13px;border-radius:9px;box-shadow:0 2px 10px rgba(14,18,23,.12);border:1px solid var(--line);font-family:var(--font-mono);font-size:11px;letter-spacing:0.03em;line-height:1.95;color:var(--graphite)}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>
<div id="sidebar">
  <a class="home" href="index.html" title="Zur Übersicht">‹ Übersicht</a>
  <div class="brand">
    <div class="tile"><span>r<i>.</i></span></div>
    <span class="wm">rombro<i>.</i>ch</span>
  </div>
  <span class="lbl">Treuhänder · Karte</span>
  <div class="sep"></div>
  <input type="file" id="fileInput" accept=".csv">
  <button id="btnLoad" onclick="document.getElementById('fileInput').click()">CSV laden</button>
  <button id="btnDraw" onclick="toggleDraw()" disabled>Bereich zeichnen</button>
  <button id="btnClear" onclick="clearAll()" disabled>Löschen</button>
  <button id="btnExport" onclick="doExport()" disabled>Exportieren</button>
  <span id="status">CSV laden zum Starten</span>
</div>
<div id="map"></div>
<div id="hint"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
  onerror="alert('Leaflet konnte nicht geladen werden. Bitte Internetverbindung prüfen.')"></script>
<script>
// ── Karte ──────────────────────────────────────────────────────────────────
var map = L.map('map').setView([47.377987, 8.679233], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:19
}).addTo(map);
// Flex-Layout: Kartengrösse nach Render korrigieren
window.addEventListener('load', function(){ setTimeout(function(){ map.invalidateSize(); }, 60); });

// Büro
var officeIcon = L.divIcon({
  html:'<div style="width:14px;height:14px;background:#0E1217;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 3px #0FA86F;margin:-7px 0 0 -7px"></div>',
  className:'',iconSize:[0,0]
});
L.marker([47.377987,8.679233],{icon:officeIcon}).addTo(map)
  .bindPopup('<b>Dein Büro</b>');

// Legende
var leg=L.control({position:'bottomright'});
leg.onAdd=function(){
  var d=L.DomUtil.create('div','legend');
  d.innerHTML='<span class="dot" style="background:#5B6373"></span>Alle Treuhänder<br>'+
    '<span class="dot" style="background:#0FA86F"></span>Im Bereich<br>'+
    '<span class="dot" style="background:#0E1217;box-shadow:0 0 0 2px #0FA86F"></span>Dein Büro';
  return d;
};
leg.addTo(map);

// ── State ──────────────────────────────────────────────────────────────────
var allData=[],markers=[],filteredData=[];
var drawing=false,drawPoints=[],drawLayer=null,polyLayer=null;

// ── CSV laden ──────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file)return;
  hint('Datei wird geladen…');
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var text=ev.target.result;
      if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
      var rows=parseCSV(text);
      if(!rows.length){hint('CSV ist leer!');return;}
      var keys=Object.keys(rows[0]);
      var latKey=keys.find(function(k){return k.toLowerCase().indexOf('lat')>-1;});
      var lngKey=keys.find(function(k){return k.toLowerCase().indexOf('lng')>-1||k.toLowerCase().indexOf('lon')>-1;});
      if(!latKey||!lngKey){
        hint('Spalten koordinaten_lat/koordinaten_lng nicht gefunden! Spalten: '+keys.join(', '));
        return;
      }
      markers.forEach(function(m){map.removeLayer(m);});
      markers=[];allData=[];filteredData=[];
      rows.forEach(function(row){
        var lat=parseFloat(row[latKey]);
        var lng=parseFloat(row[lngKey]);
        if(isNaN(lat)||isNaN(lng)||lat===0&&lng===0)return;
        var m=L.circleMarker([lat,lng],{
          radius:6,fillColor:'#5B6373',color:'#fff',
          weight:1.5,opacity:1,fillOpacity:.85
        }).addTo(map);
        var web=row.webseite?'<br><a href="'+row.webseite+'" target="_blank" style="color:#0A7A52;font-size:11px">'+row.webseite+'</a>':'';
        m.bindPopup('<b>'+(row.name||'–')+'</b><br><span style="font-size:11px;color:#666">'+(row.strasse||'')+', '+(row.plz||'')+' '+(row.ort||'')+'</span>'+web);
        m.rowData=row;
        markers.push(m);
        allData.push(row);
      });
      if(markers.length){
        map.fitBounds(L.featureGroup(markers).getBounds().pad(.08));
      }
      hint(allData.length+' Treuhänder geladen ('+(rows.length-allData.length)+' ohne Koordinaten übersprungen)',3000);
      document.getElementById('btnDraw').disabled=false;
      updateStatus();
    }catch(err){
      hint('Fehler: '+err.message);
      console.error(err);
    }
  };
  reader.onerror=function(){hint('Datei konnte nicht gelesen werden.');};
  reader.readAsText(file,'UTF-8');
  this.value='';
});

// ── Polygon zeichnen (ohne externe Bibliothek) ─────────────────────────────
function toggleDraw(){
  if(drawing){
    finishDraw();
  } else {
    startDraw();
  }
}

function startDraw(){
  drawing=true;
  drawPoints=[];
  if(drawLayer){map.removeLayer(drawLayer);drawLayer=null;}
  if(polyLayer){map.removeLayer(polyLayer);polyLayer=null;}
  map.getContainer().style.cursor='crosshair';
  document.getElementById('btnDraw').textContent='✓ Fertig (oder Doppelklick)';
  document.getElementById('btnDraw').classList.add('active');
  hint('Klicken zum Hinzufügen von Punkten — Doppelklick oder "Fertig" zum Abschliessen');
  map.on('click',onMapClick);
  map.on('dblclick',onMapDblClick);
}

function onMapClick(e){
  if(!drawing)return;
  drawPoints.push(e.latlng);
  updateDrawPreview();
}

function onMapDblClick(e){
  if(!drawing)return;
  // letzten Doppelklick-Punkt nicht doppelt hinzufügen
  finishDraw();
}

function updateDrawPreview(){
  if(drawLayer){map.removeLayer(drawLayer);}
  if(drawPoints.length<2)return;
  drawLayer=L.polyline(drawPoints,{color:'#0A7A52',weight:2,dashArray:'6,4'}).addTo(map);
}

function finishDraw(){
  map.off('click',onMapClick);
  map.off('dblclick',onMapDblClick);
  drawing=false;
  map.getContainer().style.cursor='';
  document.getElementById('btnDraw').textContent='Bereich neu zeichnen';
  document.getElementById('btnDraw').classList.remove('active');
  if(drawLayer){map.removeLayer(drawLayer);drawLayer=null;}
  hint('');
  if(drawPoints.length<3){
    hint('Mindestens 3 Punkte benötigt.',2500);
    return;
  }
  polyLayer=L.polygon(drawPoints,{color:'#0A7A52',fillOpacity:.08,weight:2}).addTo(map);
  filterByPoly(drawPoints);
  document.getElementById('btnClear').disabled=false;
}

function filterByPoly(ring){
  filteredData=[];
  markers.forEach(function(m){
    if(pip(m.getLatLng(),ring)){
      m.setStyle({fillColor:'#0FA86F',radius:8,fillOpacity:1});
      m.bringToFront();
      filteredData.push(m.rowData);
    } else {
      m.setStyle({fillColor:'#c7cabf',radius:4,fillOpacity:.4});
    }
  });
  updateStatus();
  document.getElementById('btnExport').disabled=filteredData.length===0;
  hint(filteredData.length+' Treuhänder im Bereich gefunden.',3000);
}

// Ray-casting
function pip(pt,ring){
  var x=pt.lng,y=pt.lat,inside=false;
  for(var i=0,j=ring.length-1;i<ring.length;j=i++){
    var xi=ring[i].lng,yi=ring[i].lat;
    var xj=ring[j].lng,yj=ring[j].lat;
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function clearAll(){
  if(drawLayer){map.removeLayer(drawLayer);drawLayer=null;}
  if(polyLayer){map.removeLayer(polyLayer);polyLayer=null;}
  drawPoints=[];filteredData=[];drawing=false;
  map.off('click',onMapClick);map.off('dblclick',onMapDblClick);
  map.getContainer().style.cursor='';
  document.getElementById('btnDraw').textContent='Bereich zeichnen';
  document.getElementById('btnDraw').classList.remove('active');
  document.getElementById('btnClear').disabled=true;
  document.getElementById('btnExport').disabled=true;
  markers.forEach(function(m){m.setStyle({fillColor:'#5B6373',radius:6,fillOpacity:.85});});
  updateStatus();
  hint('');
}

// ── Export ─────────────────────────────────────────────────────────────────
function doExport(){
  if(!filteredData.length)return;
  var headers=Object.keys(filteredData[0]);
  var lines=filteredData.map(function(r){
    return headers.map(function(h){
      var v=r[h]===undefined?'':String(r[h]);
      if(v.indexOf(',')>-1||v.indexOf('"')>-1||v.indexOf('\n')>-1)v='"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(',');
  });
  var csv='﻿'+headers.join(',')+'\n'+lines.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='treuhaender_gefiltert.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  hint(filteredData.length+' Einträge exportiert ✓',3000);
}

// ── CSV Parser (RFC-4180: quote-aware, Felder dürfen Zeilenumbrüche enthalten)
function parseCSV(text){
  var records=[],field='',rec=[],inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i++;}   // verdoppeltes "" → literales "
        else inQ=false;                          // Quote-Ende
      } else field+=c;                           // alles inkl. \n gehört zum Feld
    } else {
      if(c==='"') inQ=true;
      else if(c===',') {rec.push(field);field='';}
      else if(c==='\n'){rec.push(field);records.push(rec);rec=[];field='';}
      else if(c==='\r'){                          // lone \r = Zeilenende, \r\n wird vom \n erledigt
        if(text[i+1]!=='\n'){rec.push(field);records.push(rec);rec=[];field='';}
      }
      else field+=c;
    }
  }
  if(field!==''||rec.length){rec.push(field);records.push(rec);}  // letzte Zeile ohne Newline

  if(!records.length) return [];
  var headers=records[0].map(function(h){return h.trim();});
  var rows=[];
  for(var r=1;r<records.length;r++){
    var cols=records[r];
    if(cols.length===1 && cols[0].trim()==='') continue;          // leere Zeile überspringen
    var obj={};
    for(var j=0;j<headers.length;j++) obj[headers[j]]=(cols[j]!==undefined?cols[j]:'').trim();
    rows.push(obj);
  }
  return rows;
}

// ── Status / Hint ──────────────────────────────────────────────────────────
function updateStatus(){
  var el=document.getElementById('status');
  if(!allData.length){el.innerHTML='CSV laden zum Starten';return;}
  if(!polyLayer&&!drawing){el.innerHTML='<b>'+allData.length+'</b> geladen — Bereich zeichnen';return;}
  if(filteredData.length){el.innerHTML='<b>'+filteredData.length+'</b> von '+allData.length+' im Bereich';}
  else{el.innerHTML='<b>'+allData.length+'</b> geladen';}
}

var hintTimer;
function hint(msg,ms){
  var el=document.getElementById('hint');
  el.textContent=msg;
  el.style.display=msg?'block':'none';
  clearTimeout(hintTimer);
  if(msg&&ms) hintTimer=setTimeout(function(){el.style.display='none';},ms);
}
</script>
</body>
</html>
