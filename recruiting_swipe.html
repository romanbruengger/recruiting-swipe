<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F6F3;--card:#FFFFFF;--accent:#0FA86F;--accent-text:#0A7A52;
  --reject:#C0392B;--ink:#0E1217;--text:#0E1217;--muted:#5B6373;--steel:#939AA6;
  --line:#D8DAD4;--mist:#E7E8E3;--border:#D8DAD4;
  --font-sans:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
.wm{font-weight:700;letter-spacing:-0.035em}
.wm i{color:var(--accent);font-style:normal}
.tile{background:var(--accent);border-radius:7px;display:flex;align-items:flex-end;padding:3px 4px;flex-shrink:0;width:30px;height:30px}
.tile span{font-weight:700;font-size:18px;color:#fff;line-height:.72;letter-spacing:-0.05em}
.tile span i{color:var(--ink);font-style:normal}
button,input{font-family:var(--font-sans)}
.home{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:6px 9px;border-radius:7px;white-space:nowrap;transition:color .15s,border-color .15s}
.home:hover{color:var(--accent-text);border-color:var(--accent)}
.big-btn{background:var(--accent);color:#fff;padding:11px 26px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.big-btn:hover{filter:brightness(1.08)}
.ghost{background:var(--card);border:1px solid var(--line);color:var(--text);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}
.ghost:hover{border-color:var(--accent);color:var(--accent-text)}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:row;overflow:hidden}

/* Sidebar (links) â immer sichtbar */
#sidebar{display:flex;flex-direction:column;width:84px;background:var(--card);border-right:1px solid var(--line);flex-shrink:0;padding-top:14px;gap:4px}
.nav{background:none;border:none;border-left:3px solid transparent;color:var(--muted);cursor:pointer;padding:13px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:600;font-family:inherit}
.nav .ic{font-size:23px;line-height:1}
.nav:hover{color:var(--ink);background:rgba(14,18,23,.04)}
.nav.active{color:var(--accent-text);border-left-color:var(--accent);background:rgba(15,168,111,.09)}

/* Main (rechts neben Sidebar) */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* Header â immer sichtbar */
#hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 18px;background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
#hdr .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
#hdr-right{display:flex;align-items:center;gap:9px}
#prog{font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;color:var(--muted)}
.hbtn{border:1px solid var(--line);background:var(--card);color:var(--text);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:border-color .15s,color .15s;display:inline-flex;align-items:center}
.hbtn:hover{border-color:var(--accent);color:var(--accent-text)}
#btn-load{background:var(--accent);border-color:var(--accent);color:#fff}
#btn-load:hover{filter:brightness(1.08);color:#fff}
#ml-n{background:var(--accent);color:#fff;border-radius:50%;width:17px;height:17px;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-left:6px}

/* Listenansicht */
#list{flex:1;display:none;flex-direction:column;overflow:hidden;padding:14px 16px 0}
#list.on{display:flex}
#list-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-shrink:0}

#list-rows{overflow-y:auto;flex:1;border-top:1px solid var(--line)}
.lrow{display:flex;align-items:center;gap:13px;padding:11px 8px;border-bottom:1px solid var(--line);cursor:pointer}
.lrow:hover{background:rgba(14,18,23,.035)}
.lrow-av{position:relative;width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;overflow:hidden}
.lrow-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
.lrow-txt{min-width:0;flex:1}

/* Stage */
#stage{flex:1;display:none;align-items:center;justify-content:center;position:relative;overflow:hidden}

/* Leerzustand (noch keine CSV) */
.empty{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:24px;max-width:380px}
.empty .load-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent-text)}

/* Card */
.card{position:absolute;width:min(400px,90vw);background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 10px 34px rgba(14,18,23,.12);touch-action:none;user-select:none;will-change:transform}
.card.back{transform:scale(.96) translateY(12px);z-index:1;pointer-events:none}
.card.front{z-index:2;cursor:pointer}
.card.is-saved{border-color:var(--accent);border-width:2px;box-shadow:0 0 0 3px rgba(15,168,111,.22),0 10px 34px rgba(14,18,23,.12)}
.card.front:hover{box-shadow:0 18px 50px rgba(14,18,23,.18);transition:box-shadow .18s}
.card.front:hover .body{background:rgba(14,18,23,.015)}

.photo{width:100%;height:380px;object-fit:cover;object-position:top center;display:block;background:var(--mist)}
.initials{width:100%;height:380px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:900;letter-spacing:-2px;color:#fff}
.body{padding:18px 20px 20px}
.p-name{font-size:21px;font-weight:800;line-height:1.2;margin-bottom:3px}
.p-pos{font-size:13px;color:var(--accent-text);font-weight:600;margin-bottom:2px}
.p-firm{font-size:12px;color:var(--muted);margin-bottom:14px}
.divider{height:1px;background:var(--line);margin-bottom:12px}
.row{display:flex;align-items:flex-start;gap:9px;font-size:13px;margin-bottom:8px;line-height:1.4}
.row span{opacity:.55;flex-shrink:0;margin-top:1px}
.row a{color:var(--text);text-decoration:none;word-break:break-all;cursor:pointer}
.row a:hover{color:var(--accent-text);text-decoration:underline}

/* Overlay */
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:16px;opacity:0;pointer-events:none;font-size:44px;font-weight:900;letter-spacing:2px;transition:opacity .05s}
.ov-like{background:rgba(15,168,111,.14);color:var(--accent);border:3px solid var(--accent)}
.ov-nope{background:rgba(192,57,43,.12);color:var(--reject);border:3px solid var(--reject)}
.ov-saved{background:rgba(15,168,111,.20);color:var(--accent);border:3px solid var(--accent);font-size:84px}
.saved-badge{position:absolute;top:12px;right:12px;background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:5;box-shadow:0 2px 8px rgba(14,18,23,.25)}

/* Aktions-Buttons */
#btns{display:none;justify-content:center;gap:18px;padding:16px;flex-shrink:0}
.btn{width:58px;height:58px;border-radius:50%;border:2px solid;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .12s,background .12s}
.btn:hover{transform:scale(1.12)}
.btn:active{transform:scale(.95)}
.btn-n{border-color:var(--steel);color:var(--steel)}.btn-n:hover{background:var(--steel);color:#fff}
.btn-l{border-color:var(--accent);color:var(--accent)}.btn-l:hover{background:var(--accent);color:#fff}
#kbd{display:none;flex-shrink:0;padding:6px 16px 14px;text-align:center}
#kbd-inner{display:inline-flex;gap:6px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 20px;flex-wrap:wrap;justify-content:center}
.kbd-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);white-space:nowrap}
.kbd-item+.kbd-item{padding-left:12px;border-left:1px solid var(--line)}
.key{background:var(--bg);border:1px solid var(--line);border-bottom:3px solid var(--line);border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--ink);font-family:var(--font-mono);line-height:1.4}

/* Done */
#done{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;text-align:center;padding:20px}
#done .em{font-size:46px;color:var(--accent-text)}
#done h2{font-size:22px}
#done p{font-size:13px;color:var(--muted)}

#file{display:none}

/* Merkliste */
#ml{position:fixed;inset:0;background:rgba(14,18,23,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
#ml.open{display:flex}
#ml-box{background:var(--card);width:min(480px,100%);border-radius:16px 16px 0 0;max-height:78vh;display:flex;flex-direction:column;border-top:1px solid var(--line);box-shadow:0 -8px 40px rgba(14,18,23,.18)}
#ml-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
#ml-head h3{font-size:15px;font-weight:700}
#ml-x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
#ml-body{overflow-y:auto;flex:1}
#ml-foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px}
#ml-exp{background:var(--accent);color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;flex:1}
#ml-clr{background:var(--card);border:1px solid var(--line);color:var(--muted);padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer}
.li{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.li:last-child{border:none}
.li-n{font-size:14px;font-weight:600;margin-bottom:2px}
.li-s{font-size:12px;color:var(--muted)}
.li-rm{background:none;border:none;color:var(--reject);font-size:18px;cursor:pointer;opacity:.5}.li-rm:hover{opacity:1}
#ml-empty{padding:36px;text-align:center;font-size:13px;color:var(--muted)}

/* Toast */
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--ink);color:#F6F6F3;padding:8px 16px;border-radius:8px;font-size:13px;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
#toast.on{opacity:1}
</style>
</head>
<body>

<div id="main">

<div id="hdr">

    <a class="home" href="index.html" title="Zur Ãbersicht">âđ Ãbersicht</a>

</div>

</div><!-- /#main -->

<input type="file" id="file" accept=".csv">

<script>
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// State
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
var cards     = [];      // gefilterte Mitarbeiterliste
var idx       = 0;       // aktuelle Position
var busy      = false;   // Verhindert Doppel-Aktionen
var hist      = [];      // Undo-Stack
var saved     = JSON.parse(localStorage.getItem('rs_saved') || '[]');
var fields    = [];      // CSV-Header
var view      = 'swipe'; // 'swipe' | 'list'
var loadError = '';      // Fehlermeldung beim Laden

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// CSV laden
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
document.getElementById('file').addEventListener('change', function(e) {
  var f = e.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var t = ev.target.result;
      if (t.charCodeAt(0) === 0xFEFF) t = t.slice(1);
      var parsed = csvParse(t);
      fields = parsed.fields;
      // Filter & deduplizieren
      var BAD = /^(unser|unsere|ihre|externer|full\s|aktuell|newsletter|themen|vorteile|leistungen|bÃžro|partnernetz|grÃžnder|kontakt\s|portrait\s|dienstleistung|service|about\s)/i;
      var seen = {};
      cards = parsed.rows.filter(function(r) {
        var n = (r.voller_name || '').trim();
        if (!n || n.length < 3 || n.length > 45) return false;
        if (BAD.test(n)) return false;
        if (n.split(' ').length > 5) return false;
        var k = n.toLowerCase() + '|' + (r.firma || '').toLowerCase();
        if (seen[k]) return false;
        seen[k] = 1; return true;
      });
      if (!cards.length) { showErr('Keine gÃžltigen EintrÃĪge in dieser CSV gefunden.'); return; }
      loadError = ''; idx = 0; hist = [];
      badgeUpdate();
      setView(view);   // aktuelle Ansicht mit den neuen Daten fÃžllen
      toast('â ' + cards.length + ' Kandidaten geladen');
    } catch(ex) { showErr('Fehler: ' + ex.message); }
  };
  r.readAsText(f, 'UTF-8');
  this.value = '';
});

function showErr(msg) {
  loadError = msg;
  if (view === 'list') renderList(); else render();
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// Render (Swipe)
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function render() {
  if (view !== 'swipe') return;   // Listenansicht steuert ihre Sichtbarkeit selbst
  var stage = document.getElementById('stage');
  stage.innerHTML = '';
  document.getElementById('done').style.display = 'none';

  // Noch keine Daten â Lade-Aufforderung im Stage
  if (!cards.length) {
    stage.style.display = 'flex';
    stage.appendChild(makeEmpty());
    document.getElementById('btns').style.display = 'none';
    document.getElementById('kbd').style.display  = 'none';
    progUpdate();
    return;
  }

  // Alle durch
  if (idx >= cards.length) {
    stage.style.display = 'none';
    document.getElementById('done').style.display = 'flex';
    document.getElementById('btns').style.display = 'none';
    document.getElementById('kbd').style.display  = 'none';

// Pointer Events
// Capture erst nach echtem Drag-Start â Links in Chromium funktionieren normal
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function addPointer(card) {
  var sx=0, sy=0, dx=0, dy=0, down=false, dragging=false;

  card.addEventListener('pointerdown', function(e) {
    if (busy || e.button !== 0) return;
    down = true; dragging = false;
    dx = 0; dy = 0;
    sx = e.clientX; sy = e.clientY;
    card.style.transition = 'none';
  });

  card.addEventListener('pointermove', function(e) {
    if (!down) return;
    dx = e.clientX - sx;
    dy = e.clientY - sy;
    if (!dragging && Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
    if (!dragging) {
      dragging = true;
      card.setPointerCapture(e.pointerId);
    }
    card.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+(dx*0.07)+'deg)';
    var p = Math.min(Math.abs(dx)/90, 1);
    card.querySelector('.ov-like').style.opacity = dx > 0 ? p : 0;
    card.querySelector('.ov-nope').style.opacity = dx < 0 ? p : 0;
  });

  card.addEventListener('pointerup', function(e) {
    if (!down) return;
    down = false;
    if (dragging) {
      dragging = false;
      try { card.releasePointerCapture(e.pointerId); } catch(x){}
      card.style.transition = 'transform .3s, opacity .3s';
      if      (dx >  80) flyOut(card, 'right');
      else if (dx < -80) flyOut(card, 'left');
      else {
        card.style.transform = '';
        card.querySelector('.ov-like').style.opacity = 0;
        card.querySelector('.ov-nope').style.opacity = 0;
      }
    } else {
      var hit = document.elementFromPoint(e.clientX, e.clientY);
      var t = hit;
      while (t && t !== card) {
        if (t.tagName === 'A' && t.href) {
          window.open(t.href, '_blank', 'noopener,noreferrer');
          return;
        }
        t = t.parentElement;
      }
      if (card._d && card._d.voller_name) {
        var q = encodeURIComponent(card._d.voller_name + ' linkedin treuhand');
        window.open('https://www.google.com/search?q=' + q, '_blank', 'noopener,noreferrer');
      }
    }
  });

  card.addEventListener('pointercancel', function() {
    down = false; dragging = false;
    card.style.transition = 'transform .3s';
    card.style.transform = '';
    card.querySelector('.ov-like').style.opacity = 0;
    card.querySelector('.ov-nope').style.opacity = 0;
  });
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// Swipe-Logik
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function flyOut(card, dir) {
  if (busy) return;
  busy = true;
  if (dir === 'right') {
    saveEntry(card._d);
    var ov = document.createElement('div');
    ov.className = 'ov ov-saved';
    ov.textContent = 'â';
    ov.style.opacity = '1';
    card.appendChild(ov);
    setTimeout(function() {
      var tx = 700, ty = -80, rot = 22;
      card.style.transition = 'transform .32s ease-in, opacity .32s';
      card.style.transform  = 'translate('+tx+'px,'+ty+'px) rotate('+rot+'deg)';
      card.style.opacity    = '0';
      setTimeout(function() { idx++; busy = false; render(); }, 340);
    }, 350);
  } else {
    card.style.transition = 'transform .32s ease-in, opacity .32s';
    card.style.transform  = 'translate(-700px,80px) rotate(-22deg)';
    card.style.opacity    = '0';
    setTimeout(function() { idx++; busy = false; render(); }, 340);
  }
  hist.push({ dir: dir, d: card._d });
}

function doSwipe(dir) {
  if (busy || idx >= cards.length) return;
  var front = document.querySelector('.card.front');
  if (front) flyOut(front, dir);
}

function doLike() {
  if (busy || idx >= cards.length) return;
  var front = document.querySelector('.card.front');
  if (!front) return;
  confetti();
  flyOut(front, 'right');
}

function doUndo() {
  if (busy || idx === 0) return;
  if (hist.length) hist.pop();
  idx--;
  render();
  toast('âĐ ZurÃžck');
}

function restart() {
  idx = 0; hist = []; busy = false;
  render();
  toast('âš Von vorne gestartet');
}

function saveEntry(d) {
  if (isSaved(d)) return;
  var entry = Object.assign({}, d, {
    google_linkedin_url: 'https://www.google.com/search?q=' +
      encodeURIComponent((d.voller_name || '') + ' linkedin treuhand')
  });
  saved.push(entry); saveLocal(); badgeUpdate();
  toast('âĨ Gemerkt');
}

function isSaved(d) {
  return saved.some(function(s) {
    return s.voller_name === d.voller_name && s.firma === d.firma;
  });
}
function saveLocal() {

  if (e.key === 'ArrowLeft')  doUndo();            // zurÃžck = rÃžckgÃĪngig

function progUpdate() {
  var p = document.getElementById('prog');
  if (!cards.length) { p.textContent = ''; return; }
  var current = idx >= cards.length ? cards.length : idx + 1;
  p.textContent = current + ' / ' + cards.length;
}

// Toast
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
var toastT;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ el.classList.remove('on'); }, 2000);
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// CSV Parser
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function csvParse(txt) {
  var lines = txt.split(/\r\n|\r|\n/), headers = null, rows = [];
  for (var i = 0; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cols = csvLine(lines[i]);
    if (!headers) { headers = cols.map(function(h){return h.trim();}); continue; }
    var o = {};
    for (var j = 0; j < headers.length; j++) o[headers[j]] = (cols[j]||'').trim();
    rows.push(o);
  }
  return { fields: headers || [], rows: rows };
}
function csvLine(s) {
  var r=[], c='', q=false;
  for (var i=0; i<s.length; i++) {
    if (s[i]==='"') q=!q;
    else if (s[i]===',' && !q) { r.push(c); c=''; }
    else c+=s[i];
  }
  r.push(c); return r;
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// Utils
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hash(s) {
  var h=0; for(var i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0; return h;
}

// Confetti
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function confetti() {
  var cv = document.createElement('canvas');
  cv.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999';
  document.body.appendChild(cv);
  var ctx = cv.getContext('2d');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;

  var COLORS = ['#0FA86F','#57D49B','#2A4DF0','#0A7A52','#0E1217','#E3F5EC'];
  var pieces = [];
  for (var i = 0; i < 120; i++) {
    pieces.push({
      x:  Math.random() * cv.width,
      y:  -10 - Math.random() * 200,
      r:  4 + Math.random() * 6,
      d:  2 + Math.random() * 4,
      c:  COLORS[Math.floor(Math.random() * COLORS.length)],
      tilt: Math.random() * 10 - 5,
      tiltSpeed: 0.1 + Math.random() * 0.2,
      tiltAngle: 0,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }

  var frame, start = performance.now();
  function draw(now) {
    var elapsed = now - start;
    ctx.clearRect(0, 0, cv.width, cv.height);
    var alive = false;
    for (var i = 0; i < pieces.length; i++) {
      var p = pieces[i];
      p.y += p.d;
      p.x += Math.sin(elapsed * 0.003 + i) * 1.2;
      p.tiltAngle += p.tiltSpeed;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      if (p.y < cv.height + 20) alive = true;
      ctx.fillStyle = p.c;
      ctx.globalAlpha = Math.max(0, 1 - elapsed / 2800);
      ctx.beginPath();
      if (p.shape === 'circle') {
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.tilt * Math.PI / 180);
        ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
        ctx.restore();
        continue;
      }
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (alive && elapsed < 2800) {
      frame = requestAnimationFrame(draw);
    } else {
      cancelAnimationFrame(frame);
      document.body.removeChild(cv);
    }
  }
  frame = requestAnimationFrame(draw);
}
